name: ecomap
description: "에코지도 찌릿 — 광명시 분리배출 안내·수거함 지도·공백분석 (2026 광명시 청년 생각펼침 공모사업)"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  image_picker: ^1.2.3
  http: ^1.6.0
  uuid: ^4.6.0
  shared_preferences: ^2.5.5
  sqflite: ^2.4.3
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.4.2
  flutter_launcher_icons: ^0.14.4

# 앱 아이콘 생성 — `dart run flutter_launcher_icons`.
# 원본: assets/brand/logo_1024.png (포레스트그린 #2E7D46 배경 포함).
flutter_launcher_icons:
  image_path: "assets/brand/logo_1024.png"
  android: true
  ios: false
  adaptive_icon_background: "#2E7D46"
  adaptive_icon_foreground: "assets/brand/logo_1024.png"
  web:
    generate: true
    image_path: "assets/brand/logo_1024.png"
    background_color: "#2E7D46"
    theme_color: "#2E7D46"

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/brand/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
