name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  repository-check:
    name: Repository check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required project files
        run: |
          test -f README.md
          test -f UIUX.png

      - name: Check README local image references
        run: |
          python - <<'PY'
          import re
          import sys
          from pathlib import Path

          readme = Path("README.md")
          text = readme.read_text(encoding="utf-8")

          html_refs = re.findall(r'<img\s+[^>]*src="([^"]+)"', text)
          markdown_refs = re.findall(r'!\[[^\]]*\]\(([^)]+)\)', text)
          refs = html_refs + markdown_refs

          missing = []
          for ref in refs:
              if ref.startswith(("http://", "https://", "#", "mailto:")):
                  continue
              path = Path(ref.split("#", 1)[0])
              if not path.exists():
                  missing.append(ref)

          if missing:
              print("Missing local README references:")
              for ref in missing:
                  print(f"- {ref}")
              sys.exit(1)

          print("README local references are valid.")
          PY

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect backend project
        id: backend
        run: |
          if [ -f backend/requirements.txt ] || [ -f backend/pyproject.toml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Backend project not found. Skipping backend CI."
          fi

      - name: Set up Python
        if: steps.backend.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/pyproject.toml

      - name: Install dependencies
        if: steps.backend.outputs.exists == 'true'
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ruff pytest

      - name: Lint backend
        if: steps.backend.outputs.exists == 'true'
        working-directory: backend
        run: ruff check .

      - name: Run backend tests
        if: steps.backend.outputs.exists == 'true'
        working-directory: backend
        run: |
          if [ -d tests ]; then
            pytest
          else
            python -m compileall .
          fi

  flutter-ci:
    name: Flutter CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Flutter project
        id: flutter
        run: |
          if [ -f frontend/pubspec.yaml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Flutter project not found. Skipping Flutter CI."
          fi

      - name: Set up Flutter
        if: steps.flutter.outputs.exists == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        if: steps.flutter.outputs.exists == 'true'
        working-directory: frontend
        run: flutter pub get

      - name: Analyze Flutter code
        if: steps.flutter.outputs.exists == 'true'
        working-directory: frontend
        run: flutter analyze

      - name: Run Flutter tests
        if: steps.flutter.outputs.exists == 'true'
        working-directory: frontend
        run: flutter test

  build-artifact:
    name: Build CI artifact
    runs-on: ubuntu-latest
    needs:
      - repository-check
      - backend-ci
      - flutter-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare planning artifact
        run: |
          mkdir -p dist
          cp README.md dist/
          cp UIUX.png dist/

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecomap-planning-artifact
          path: dist/
